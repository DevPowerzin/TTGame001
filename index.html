<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>TTgme</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    main {
      border: 2px solid #222;
    }

    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>

<body>

  <main>
    <canvas id="game" width="800" height="500"></canvas>
  </main>

  <script src="inventory.js"></script>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    // =========================
    // CARREGAMENTO DE IMAGENS
    // =========================
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.src = src;
        img.onload = () => resolve(img);
        img.onerror = () => reject("Erro ao carregar: " + src);
      });
    }

    async function startGame() {

      const playerImg = await loadImage("pers.tt.png");
      const paperImg = await loadImage("desenho.tt.jpeg");
      const salaImg = await loadImage("CenarioSala.jpeg");
      const quartoImg = await loadImage("CenarioQuarto.jpeg");
      const jardimImg = await loadImage("CenarioJardim.jpeg");
      const subjectImg = await loadImage("Subject029.tt.png");
      const subjectSound = new Audio("efeito-sonoro-_2_.mp3");
      subjectSound.volume = 1;
      const inventory = new Inventory();
      const paperIcon = await loadImage("Paper2.png");

      // =========================
      // ESTADO
      // =========================
      let scene = "quarto";
      let showDialogue = true;
      let dialogueIndex = 0;
      let showPaper = false;
      let interactHint = null; // "porta" ou "papel"
      let subjectActive = false;
      let subjectShown = false;
      let subjectTimer = 0;
      let paperCollected = false;
      let showHint = false;
      let hintStartTime = 0;

      const dialogues = [
        "O que eu fiz...",
        "Por que eu fiz isso...",
        "Saia imediatamente do quarto e vá em direção ao quintal."
      ];

      const keys = {};

      const player = {
  x: 380,
  y: 220,
  w: 96,
  h: 96,
  speed: 3
};

      // =========================
      // INPUT
      // =========================

      window.addEventListener("keydown", (e) => {

  keys[e.key.toLowerCase()] = true;

  if (e.key.toLowerCase() === "f") {
    inventory.toggle();
  }

  if (e.key === "Enter" && showDialogue) {
    dialogueIndex++;
    if (dialogueIndex >= dialogues.length) {
      showDialogue = false;
    }
  }
});


      window.addEventListener("keydown", (e) => {
        keys[e.key.toLowerCase()] = true;

        if (e.key === "Enter" && showDialogue) {
          dialogueIndex++;
          if (dialogueIndex >= dialogues.length) {
            showDialogue = false;
          }
        }
      });

      window.addEventListener("keyup", (e) => {
        keys[e.key.toLowerCase()] = false;
      });

      canvas.addEventListener("click", (e) => {
        

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // 👇 INVENTÁRIO PRIMEIRO
  if (inventory.open) {
    inventory.handleClick(x, y);
    return;
  }
  // avançar diálogo com clique
  if (showDialogue) {
    dialogueIndex++;
    if (dialogueIndex >= dialogues.length) {
      showDialogue = false;
    }
    return;
  }

  // fechar papel
  if (showPaper) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (x > 650 && x < 680 && y > 60 && y < 90) {
      showPaper = false;
    }
  }
});

      // =========================
      // LÓGICA
      // =========================

      function drawInteractionHint() {
  if (!interactHint) return;

  const blink = Math.floor(Date.now() / 400) % 2;
  if (!blink) return;

  ctx.fillStyle = "white";
  ctx.font = "18px monospace";

  if (interactHint === "porta") {
    ctx.fillText("E", 730, 150);
  }

  if (interactHint === "papel") {
    ctx.fillText("E", 610, 290);
  }
}

  let lastTransitionTime = 0;
  const TRANSITION_DELAY = 400;

function changeScene(newScene, newX) {
  const now = Date.now();

  if (now - lastTransitionTime < TRANSITION_DELAY) return;

  scene = newScene;
  player.x = newX;

  lastTransitionTime = now;
}

      function update() {

  interactHint = null;

  if (!showDialogue && !showPaper && !inventory.open) {

    // movimento
    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    // limites
    player.x = Math.max(0, Math.min(752, player.x));
    player.y = Math.max(0, Math.min(452, player.y));

    // ================= PORTAS =================
    if (scene === "quarto") {

  // porta direita (vai pra sala)
  const doorForward =
    player.x > 740 &&
    player.y > 170 &&
    player.y < 310;

  if (doorForward) {
    interactHint = "porta";

    if (keys["e"]) {
      changeScene("sala", 80);
    }
  }
}

if (scene === "sala") {

  const doorBack =
    player.x < 60 &&
    player.y > 170 &&
    player.y < 310;

  const doorForward =
    player.x > 740 &&
    player.y > 170 &&
    player.y < 310;

  // VOLTAR
  if (doorBack) {
    interactHint = "porta";

    if (keys["e"]) {
      changeScene("quarto", 680);
    }
  }

  // IR
  else if (doorForward) {
    interactHint = "porta";

    if (keys["e"]) {
      changeScene("quintal", 80);
    }
  }
}

if (scene === "quintal") {

  const doorBack =
    player.x < 60 &&
    player.y > 170 &&
    player.y < 310;

  if (doorBack) {
    interactHint = "porta";

    if (keys["e"]) {
      changeScene("sala", 680);
    }
  }
}
    // ================= PAPEL =================
    if (scene === "quintal") {

      const nearPaper =
        player.x < 650 &&
        player.x + player.w > 600 &&
        player.y < 340 &&
        player.y + player.h > 300;

      if (nearPaper && !paperCollected) {
        interactHint = "papel";

        if (keys["e"]) {
  showPaper = true;

  paperCollected = true;
  showHint = true;
  hintStartTime = Date.now();

  // adiciona ao inventário (uma vez só)
  if (!inventory.items.find(i => i.name === "Desenho")) {
    inventory.addItem({
  name: "Desenho",
  desc: "Algo parece errado...",
  icon: paperIcon
});
  }

  // ativa o evento SOMENTE NA PRIMEIRA VEZ
  if (!subjectShown) {
    subjectActive = true;
    subjectTimer = Date.now();
    subjectShown = true;
    // 🔊 TOCAR SOM
    subjectSound.currentTime = 0;
    subjectSound.play().catch(() => {});
  }
}
      }
    }
  }
}

      // =========================
      // RENDER
      // =========================
      function drawScene() {

  // QUARTO
  if (scene === "quarto") {
    ctx.drawImage(quartoImg, 0, 0, 800, 500);

    // porta (zona invisível, mas desenha leve sombra)
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(740, 170, 40, 140);
  }

  // SALA
  else if (scene === "sala") {
    ctx.drawImage(salaImg, 0, 0, 800, 500);

    // porta esquerda
ctx.fillStyle = "rgba(0,0,0,0.3)";
ctx.fillRect(0, 170, 40, 140);

// porta direita
ctx.fillRect(740, 170, 40, 140);
  }

  // JARDIM
  else if (scene === "quintal") {
    ctx.drawImage(jardimImg, 0, 0, 800, 500);

    // porta esquerda (voltar)
ctx.fillStyle = "rgba(0,0,0,0.3)";
ctx.fillRect(0, 170, 40, 140);

    // 👇 SÓ DESENHA SE NÃO FOI COLETADO
  if (!paperCollected) {
    ctx.fillStyle = "#fff";
    ctx.fillRect(600, 300, 50, 40);
}
  }

  // vinheta (mantém clima estranho 👁️)
  let gradient = ctx.createRadialGradient(400, 250, 100, 400, 250, 400);
  gradient.addColorStop(0, "rgba(0,0,0,0)");
  gradient.addColorStop(1, "rgba(0,0,0,0.7)");

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 800, 500);
}

      function drawPlayer() {
        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
      }

      function drawDialogue() {
  if (!showDialogue) return;

  // caixa
  ctx.fillStyle = "#000";
  ctx.fillRect(40, 340, 720, 120);

  // borda
  ctx.strokeStyle = "#333";
  ctx.strokeRect(40, 340, 720, 120);

  // texto
  ctx.fillStyle = "#fff";
  ctx.font = "20px monospace";
  ctx.fillText(dialogues[dialogueIndex], 60, 400);

  // seta piscando
  const blink = Math.floor(Date.now() / 500) % 2;

  if (blink === 0) {
    ctx.fillText("▶", 720, 430);
  }
}

function drawDate() {
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.font = "16px monospace";

  ctx.fillText("12.01.1994", 650, 480);
}

      function drawPaper() {
        if (!showPaper) return;

        ctx.fillStyle = "#ddd";
        ctx.fillRect(100, 50, 600, 400);

        ctx.drawImage(paperImg, 150, 80, 500, 300);

        ctx.fillStyle = "red";
        ctx.fillRect(650, 60, 30, 30);

        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("X", 658, 82);
      }

      function drawSubject() {
  if (!subjectActive) return;

  const elapsed = Date.now() - subjectTimer;

  if (elapsed < 1500) {
    // desenha no canto superior esquerdo
    ctx.drawImage(subjectImg, 20, 20, 80, 80);
  } else {
    subjectActive = false;

    console.log("Subject permanently removed././ 029 deleted...,{OPERATING NEW SUBJECT} [RISK OF LOSS OF CONTROL]!!!^!");
  }
}
function drawHint() {
  if (!showHint) return;

  const elapsed = Date.now() - hintStartTime;

  // duração total 4s
  if (elapsed > 4000) {
    showHint = false;
    return;
  }

  let alpha = 1;

  // fade nos últimos 1.5s
  if (elapsed > 2500) {
    alpha = 1 - (elapsed - 2500) / 1500;
  }

  // glitch simples
  const glitchX = Math.random() < 0.1 ? Math.random() * 10 - 5 : 0;
  const glitchY = Math.random() < 0.1 ? Math.random() * 5 - 2 : 0;

  ctx.save();
  ctx.globalAlpha = alpha;

  ctx.fillStyle = "white";
  ctx.font = "16px monospace";

  ctx.fillText(
    "Pressione F para abrir o inventário",
    450 + glitchX,
    30 + glitchY
  );

  ctx.restore();
}

      function render() {
        ctx.clearRect(0, 0, 800, 500);

        drawScene();
        drawPlayer();
        drawDialogue();
        drawPaper();
        drawInteractionHint();
        drawDate();
        drawSubject();
        inventory.draw(ctx);
        drawHint();
      }

      // =========================
      // LOOP
      // =========================
      function loop() {
        update();
        render();
        requestAnimationFrame(loop);
      }

      loop();
    }

    // INICIA
    startGame().catch(err => {
      alert(err);
    });

  </script>

</body>

</html>
